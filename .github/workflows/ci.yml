name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend Job ──────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx aiosqlite

      - name: Lint with ruff
        run: ruff check app/

      - name: Run backend tests
        env:
          # Tests use in-memory SQLite — these placeholders satisfy config validation
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SYNC_DATABASE_URL: sqlite:///./test.db
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          APP_ENV: testing
          ALLOW_DATE_OVERRIDE: "true"
          ALLOWED_ORIGINS: http://localhost:5173
        run: pytest tests/ -v --tb=short

  # ── Frontend Job ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test -- --run

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000
